<svg xmlns="http://www.w3.org/2000/svg" width="460" height="660" viewBox="0 0 460 660">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f0e8"/>
      <stop offset="100%" style="stop-color:#e8dfc8"/>
    </linearGradient>
    <linearGradient id="spine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2d4a2d"/>
      <stop offset="100%" style="stop-color:#3d5e3d"/>
    </linearGradient>
    <linearGradient id="oval-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d4a2d;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#4a7c4a;stop-opacity:0.18"/>
    </linearGradient>
    <filter id="soft-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Fundal pergament -->
  <rect width="460" height="660" fill="url(#bg)"/>

  <!-- Spine stânga -->
  <rect x="0" y="0" width="18" height="660" fill="url(#spine)"/>

  <!-- Borduri decorative exterioare -->
  <rect x="28" y="18" width="414" height="624" fill="none" stroke="#2d4a2d" stroke-width="0.8" opacity="0.25"/>
  <rect x="34" y="24" width="402" height="612" fill="none" stroke="#2d4a2d" stroke-width="0.4" opacity="0.15"/>

  <!-- Element grafic central — frunze stilizate -->
  <!-- Tulpina centrală -->
  <path d="M230 480 C230 480 228 400 225 350 C222 300 218 265 230 230" 
        stroke="#2d4a2d" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M230 470 C230 470 232 410 235 370 C238 330 242 290 236 250" 
        stroke="#2d4a2d" stroke-width="1.1" fill="none" stroke-linecap="round" opacity="0.45"/>

  <!-- Frunze stânga -->
  <path d="M225 350 C205 335 185 315 188 288 C198 302 212 328 225 350Z" 
        fill="#2d4a2d" opacity="0.55"/>
  <path d="M222 310 C200 295 180 270 185 245 C196 262 210 290 222 310Z" 
        fill="#4a7c4a" opacity="0.4"/>
  <path d="M220 375 C198 362 176 345 179 318 C191 335 207 360 220 375Z" 
        fill="#2d4a2d" opacity="0.45"/>

  <!-- Frunze dreapta -->
  <path d="M235 345 C258 330 278 308 274 282 C263 297 248 323 235 345Z" 
        fill="#2d4a2d" opacity="0.5"/>
  <path d="M238 305 C262 290 283 264 278 240 C266 258 251 285 238 305Z" 
        fill="#4a7c4a" opacity="0.38"/>
  <path d="M236 372 C260 358 282 340 278 314 C266 332 250 356 236 372Z" 
        fill="#2d4a2d" opacity="0.42"/>

  <!-- Lăcrămioare decorative -->
  <ellipse cx="218" cy="258" rx="5" ry="7" fill="white" stroke="#2d4a2d" stroke-width="1.1" opacity="0.85"/>
  <path d="M213 261 Q218 267 223 261" stroke="#2d4a2d" stroke-width="0.8" fill="none" opacity="0.6"/>
  <ellipse cx="216" cy="272" rx="5" ry="7" fill="white" stroke="#2d4a2d" stroke-width="1.1" opacity="0.8"/>
  <path d="M211 275 Q216 281 221 275" stroke="#2d4a2d" stroke-width="0.8" fill="none" opacity="0.6"/>
  <ellipse cx="214" cy="287" rx="5" ry="7" fill="white" stroke="#2d4a2d" stroke-width="1.1" opacity="0.75"/>

  <ellipse cx="243" cy="261" rx="5" ry="7" fill="white" stroke="#2d4a2d" stroke-width="1.1" opacity="0.85"/>
  <path d="M238 264 Q243 270 248 264" stroke="#2d4a2d" stroke-width="0.8" fill="none" opacity="0.6"/>
  <ellipse cx="245" cy="275" rx="5" ry="7" fill="white" stroke="#2d4a2d" stroke-width="1.1" opacity="0.8"/>
  <path d="M240 278 Q245 284 250 278" stroke="#2d4a2d" stroke-width="0.8" fill="none" opacity="0.6"/>

  <!-- Linie orizontală elegantă sus -->
  <line x1="60" y1="155" x2="400" y2="155" stroke="#2d4a2d" stroke-width="0.5" opacity="0.25"/>
  <line x1="90" y1="160" x2="370" y2="160" stroke="#2d4a2d" stroke-width="0.3" opacity="0.15"/>

  <!-- Linie orizontală elegantă jos -->
  <line x1="60" y1="500" x2="400" y2="500" stroke="#2d4a2d" stroke-width="0.5" opacity="0.25"/>
  <line x1="90" y1="505" x2="370" y2="505" stroke="#2d4a2d" stroke-width="0.3" opacity="0.15"/>

  <!-- Ornament sus centru -->
  <text x="230" y="85" font-family="Georgia, serif" font-size="11" fill="#2d4a2d" opacity="0.4" text-anchor="middle" letter-spacing="6">VIOLETA-MIRELA</text>
  <text x="230" y="103" font-family="Georgia, serif" font-size="11" fill="#2d4a2d" opacity="0.4" text-anchor="middle" letter-spacing="6">MAREȘ</text>

  <!-- Linie subțire sub nume -->
  <line x1="150" y1="115" x2="310" y2="115" stroke="#2d4a2d" stroke-width="0.4" opacity="0.2"/>

  <!-- Titlu principal -->
  <text x="230" y="200" font-family="Georgia, serif" font-size="13" fill="#2d4a2d" opacity="0.35" text-anchor="middle" letter-spacing="4" font-style="italic">volum de poezie</text>

  <text x="230" y="568" font-family="Georgia, serif" font-size="36" fill="#1e1a14" opacity="0.82" text-anchor="middle" font-style="italic" font-weight="normal">Metaprovocare</text>

  <!-- Ornament jos -->
  <text x="230" y="630" font-family="Georgia, serif" font-size="10" fill="#2d4a2d" opacity="0.35" text-anchor="middle" letter-spacing="3">Ed. Marineasa · 1999</text>

  <!-- Colțuri decorative -->
  <path d="M50 45 L50 55 M50 45 L60 45" stroke="#2d4a2d" stroke-width="0.8" fill="none" opacity="0.3"/>
  <path d="M410 45 L410 55 M410 45 L400 45" stroke="#2d4a2d" stroke-width="0.8" fill="none" opacity="0.3"/>
  <path d="M50 615 L50 605 M50 615 L60 615" stroke="#2d4a2d" stroke-width="0.8" fill="none" opacity="0.3"/>
  <path d="M410 615 L410 605 M410 615 L400 615" stroke="#2d4a2d" stroke-width="0.8" fill="none" opacity="0.3"/>
</svg>
