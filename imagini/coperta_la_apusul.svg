<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 115 165" width="115" height="165">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="30%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2e1a"/>
      <stop offset="50%" style="stop-color:#2d4a2d"/>
      <stop offset="100%" style="stop-color:#0f1e0f"/>
    </linearGradient>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4956a;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#c9a96e;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8b870"/>
      <stop offset="100%" style="stop-color:#c9683a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a96e;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#c9a96e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#c9a96e;stop-opacity:0"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#e8b870;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#c9683a;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="60%" style="stop-color:transparent"/>
      <stop offset="100%" style="stop-color:rgba(0,0,0,0.5)"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="115" height="165" fill="url(#bg)"/>

  <!-- Sky glow at top -->
  <rect width="115" height="80" fill="url(#sky)"/>

  <!-- Spine -->
  <rect x="0" y="0" width="6" height="165" fill="rgba(0,0,0,0.25)"/>
  <rect x="0" y="0" width="1.5" height="165" fill="rgba(74,124,74,0.3)"/>

  <!-- Top gold line -->
  <rect x="12" y="14" width="91" height="0.6" fill="url(#gold)" opacity="0.7"/>
  <!-- Bottom gold line -->
  <rect x="12" y="151" width="91" height="0.6" fill="url(#gold)" opacity="0.7"/>

  <!-- Setting sun - horizon at y=105 -->
  <ellipse cx="57" cy="108" rx="30" ry="2" fill="rgba(201,104,58,0.15)"/>
  <!-- Sun glow -->
  <ellipse cx="57" cy="100" rx="22" ry="22" fill="url(#sunGlow)"/>
  <!-- Sun half-circle setting -->
  <path d="M35 105 A22 22 0 0 1 79 105 Z" fill="url(#sunGrad)" opacity="0.85"/>
  <!-- Horizon line -->
  <line x1="12" y1="105" x2="103" y2="105" stroke="rgba(201,169,110,0.3)" stroke-width="0.5"/>

  <!-- Horizon reflection streaks -->
  <rect x="44" y="106" width="26" height="0.8" fill="rgba(232,184,112,0.4)" rx="0.4"/>
  <rect x="50" y="108" width="14" height="0.6" fill="rgba(232,184,112,0.25)" rx="0.3"/>
  <rect x="53" y="110" width="8" height="0.4" fill="rgba(232,184,112,0.15)" rx="0.2"/>

  <!-- Tree silhouettes left -->
  <line x1="22" y1="105" x2="22" y2="55" stroke="rgba(15,30,15,0.9)" stroke-width="1.5"/>
  <line x1="22" y1="75" x2="14" y2="60" stroke="rgba(15,30,15,0.8)" stroke-width="0.8"/>
  <line x1="22" y1="80" x2="30" y2="65" stroke="rgba(15,30,15,0.8)" stroke-width="0.8"/>
  <line x1="22" y1="68" x2="16" y2="56" stroke="rgba(15,30,15,0.7)" stroke-width="0.6"/>
  <line x1="22" y1="65" x2="28" y2="54" stroke="rgba(15,30,15,0.7)" stroke-width="0.6"/>

  <!-- Tree silhouettes right -->
  <line x1="92" y1="105" x2="92" y2="60" stroke="rgba(15,30,15,0.9)" stroke-width="1.5"/>
  <line x1="92" y1="78" x2="84" y2="64" stroke="rgba(15,30,15,0.8)" stroke-width="0.8"/>
  <line x1="92" y1="82" x2="100" y2="68" stroke="rgba(15,30,15,0.8)" stroke-width="0.8"/>
  <line x1="92" y1="70" x2="86" y2="59" stroke="rgba(15,30,15,0.7)" stroke-width="0.6"/>

  <!-- Small tree center-left -->
  <line x1="40" y1="105" x2="40" y2="75" stroke="rgba(15,30,15,0.7)" stroke-width="1"/>
  <line x1="40" y1="88" x2="34" y2="78" stroke="rgba(15,30,15,0.6)" stroke-width="0.6"/>
  <line x1="40" y1="85" x2="46" y2="76" stroke="rgba(15,30,15,0.6)" stroke-width="0.6"/>

  <!-- Title -->
  <text x="57" y="38" font-family="Cormorant Garamond, Georgia, serif" font-size="7" font-style="italic" font-weight="300" fill="rgba(245,240,232,0.9)" text-anchor="middle" letter-spacing="0.3">La apusul</text>
  <text x="57" y="49" font-family="Cormorant Garamond, Georgia, serif" font-size="9" font-style="italic" font-weight="400" fill="#c9a96e" text-anchor="middle" letter-spacing="0.5">poemelor</text>
  <rect x="30" y="54" width="55" height="0.4" fill="rgba(201,169,110,0.4)"/>

  <!-- Author -->
  <text x="57" y="126" font-family="Cinzel, serif" font-size="4.8" fill="rgba(200,230,200,0.75)" text-anchor="middle" letter-spacing="0.8">MIRELA MAREȘ</text>

  <!-- Publisher -->
  <text x="57" y="142" font-family="Cinzel, serif" font-size="3.8" fill="rgba(200,230,200,0.4)" text-anchor="middle" letter-spacing="0.5">Ed. Didaktikos · 2025</text>

  <!-- Vignette -->
  <rect width="115" height="165" fill="url(#vignette)"/>
</svg>
